services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: always
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://todo_user:password@postgres:5432/todo_db
    container_name: todo_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://todo_user:password@postgres:5432/todo_db
      JWT_SECRET: super-strong-production-secret
      NODE_ENV: production

volumes:
  postgres_data:
